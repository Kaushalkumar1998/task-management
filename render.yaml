services:
  - type: web
    name: kaushal-task-management-api
    runtime: node
    plan: free
    region: singapore
    rootDir: task-management-backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: CORS_ORIGIN
        value: https://kaushal-task-management.onrender.com

  - type: web
    name: kaushal-task-management
    runtime: static
    rootDir: task-management-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist/task-management-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
